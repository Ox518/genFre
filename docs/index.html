<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitMine Pool</title>
  <style>
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
      --text: #e0e0e0; --muted: #888; --fnnc: #f97316; --tty: #3b82f6;
      --green: #22c55e; --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 1.5rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; }
    .card h2 { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
    .card .val { font-size: 1.6rem; font-weight: bold; }
    .tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: bold; margin-right: 0.3rem; }
    .fnnc { background: #7c2d1230; color: var(--fnnc); border: 1px solid var(--fnnc); }
    .tty  { background: #1e3a5f30; color: var(--tty);  border: 1px solid var(--tty); }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { color: var(--muted); text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); }
    td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #1f1f1f; word-break: break-all; }
    tr:hover td { background: #222; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
    .live { background: var(--green); }
    .stale { background: var(--red); }
    #status { font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem; }
    #live-badge { display: none; color: var(--green); font-size: 0.75rem; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <h1>⛏ GitMine Pool <span id="live-badge">● LIVE</span></h1>
  <div class="sub">Git-native dual-coin mining pool — FNNC + TTY</div>

  <div class="grid">
    <div class="card">
      <h2>Active Template</h2>
      <div class="val" id="t-coin">—</div>
      <div style="margin-top:0.3rem; font-size:0.8rem; color:var(--muted)">
        <span id="t-algo"></span> &nbsp;│&nbsp; height <span id="t-height"></span>
      </div>
    </div>
    <div class="card">
      <h2>Total Shares</h2>
      <div class="val" id="s-total">—</div>
    </div>
    <div class="card">
      <h2>FNNC Hashrate</h2>
      <div class="val" id="hr-fnnc">—</div>
    </div>
    <div class="card">
      <h2>TTY Hashrate</h2>
      <div class="val" id="hr-tty">—</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:1rem">
    <h2>Miners</h2>
    <table>
      <thead>
        <tr><th>Address</th><th>Shares</th><th>FNNC</th><th>TTY</th><th>Last Share</th><th>Status</th></tr>
      </thead>
      <tbody id="miner-table"><tr><td colspan="6" style="color:var(--muted)">Loading...</td></tr></tbody>
    </table>
  </div>

  <div id="status">Fetching data...</div>

<script>
  const PAGES = '';
  let ws;

  function fmtHashrate(h) {
    if (h > 1e9) return (h/1e9).toFixed(2) + ' GH/s';
    if (h > 1e6) return (h/1e6).toFixed(2) + ' MH/s';
    if (h > 1e3) return (h/1e3).toFixed(2) + ' KH/s';
    return h + ' H/s';
  }

  function timeAgo(ts) {
    if (!ts) return 'never';
    const d = Math.floor(Date.now()/1000) - ts;
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d/60) + 'm ago';
    return Math.floor(d/3600) + 'h ago';
  }

  async function loadTemplate() {
    try {
      const r = await fetch('template.json?_=' + Date.now());
      const t = await r.json();
      document.getElementById('t-coin').innerHTML =
        `<span class="tag ${t.coin?.toLowerCase()}">${t.coin||'?'}</span>`;
      document.getElementById('t-algo').textContent = t.algo || '';
      document.getElementById('t-height').textContent = t.height || '';
    } catch(e) {}
  }

  async function loadStats() {
    try {
      const r = await fetch('stats.json?_=' + Date.now());
      const s = await r.json();
      document.getElementById('s-total').textContent = s.total_shares ?? '0';
      const coins = s.coins || {};
      document.getElementById('hr-fnnc').textContent = fmtHashrate(coins.fnnc?.hashrate || 0);
      document.getElementById('hr-tty').textContent  = fmtHashrate(coins.tty?.hashrate  || 0);

      const tbody = document.getElementById('miner-table');
      const miners = Object.values(s.miners || {});
      if (!miners.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted)">No miners yet</td></tr>';
        return;
      }
      miners.sort((a,b) => b.shares - a.shares);
      tbody.innerHTML = miners.map(m => {
        const now = Math.floor(Date.now()/1000);
        const alive = m.last_share_at && (now - m.last_share_at) < 300;
        const addr = m.address || '?';
        const short = addr.slice(0,8) + '…' + addr.slice(-6);
        return `<tr>
          <td title="${addr}">${short}</td>
          <td>${m.shares}</td>
          <td>${m.coin_shares?.fnnc || 0}</td>
          <td>${m.coin_shares?.tty  || 0}</td>
          <td>${timeAgo(m.last_share_at)}</td>
          <td><span class="dot ${alive?'live':'stale'}"></span>${alive?'Active':'Idle'}</td>
        </tr>`;
      }).join('');
      document.getElementById('status').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch(e) {
      document.getElementById('status').textContent = 'Stats unavailable: ' + e.message;
    }
  }

  function connectRelay() {
    const relayUrl = window.RELAY_URL;
    if (!relayUrl) return;
    ws = new WebSocket(relayUrl);
    ws.onopen  = () => { document.getElementById('live-badge').style.display='inline'; };
    ws.onclose = () => { document.getElementById('live-badge').style.display='none'; setTimeout(connectRelay, 5000); };
    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state_update') { loadTemplate(); loadStats(); }
      } catch(_) {}
    };
  }

  async function refresh() {
    await Promise.all([loadTemplate(), loadStats()]);
  }

  refresh();
  setInterval(refresh, 30000);
  connectRelay();
</script>
</body>
</html>
