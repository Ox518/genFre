name: GitMine Bench Worker

on:
  workflow_dispatch:
    inputs:
      worker_id:
        description: 'bench_workers row UUID (Supabase)'
        required: true
      pool_url:
        description: 'stratum+tcp://host:port'
        required: true
        default: 'stratum+tcp://americas.mining-dutch.nl:9983'
      rig_id:
        description: 'Rig name for display'
        required: false
        default: 'bench-rig-01'
      stratum_user:
        description: 'Stratum username  e.g. 5mil.worker7'
        required: false
        default: '5mil.worker7'
      stratum_pass:
        description: 'Stratum password'
        required: false
        default: 'x'
      duration_minutes:
        description: 'Mining duration in minutes (max 55)'
        required: false
        default: '30'
      algo:
        description: 'Algorithm: yescryptr16 (FNNC) or sha256d (TTY)'
        required: false
        default: 'yescryptr16'

jobs:
  mine:
    name: mine
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPA_URL:     ${{ secrets.SUPAURL }}
      SUPA_KEY:     ${{ secrets.BENCHANONKEY }}
      WORKER_ID:    ${{ github.event.inputs.worker_id }}
      POOL_URL:     ${{ github.event.inputs.pool_url }}
      RIG_ID:       ${{ github.event.inputs.rig_id }}
      SUSER:        ${{ github.event.inputs.stratum_user }}
      SPASS:        ${{ github.event.inputs.stratum_pass }}
      DURATION_MIN: ${{ github.event.inputs.duration_minutes }}
      ALGO:         ${{ github.event.inputs.algo }}

    steps:
      - name: Validate inputs
        run: |
          python3 - << 'PYEOF'
          import os, sys, re
          pool = os.environ.get("POOL_URL", "")
          algo = os.environ.get("ALGO", "yescryptr16")
          dur  = os.environ.get("DURATION_MIN", "30")
          wid  = os.environ.get("WORKER_ID", "")
          errors = []
          if not re.match(r'^stratum\+tcp://[^:]+:\d+$', pool):
              errors.append(f"BAD_POOL_URL: '{pool}'")
          if algo not in ("yescryptr16", "sha256d"):
              errors.append(f"BAD_ALGO: '{algo}'")
          try:
              d = int(dur)
              if d < 1 or d > 55:
                  errors.append(f"BAD_DURATION: {d} — must be 1-55")
          except ValueError:
              errors.append(f"BAD_DURATION: '{dur}' not an integer")
          if not wid:
              errors.append("MISSING_WORKER_ID")
          if errors:
              for e in errors: print(f"[error] {e}", flush=True)
              sys.exit(1)
          print(f"[validate] pool={pool} algo={algo} dur={dur}min wid={wid}", flush=True)
          PYEOF

      - name: System prep — hugepages + CPU info
        run: |
          sudo sysctl -w vm.nr_hugepages=256 || true
          HUGE=$(grep HugePages_Free /proc/meminfo | awk '{print $2}')
          echo "[hugepages] free=$HUGE"
          [ "$HUGE" -lt 64 ] && echo "[warn] only $HUGE hugepages free — yescrypt scratchpad performance may be reduced" || echo "[hugepages] OK"
          echo "--- CPU INFO ---"
          lscpu | grep -E 'Model name|Socket|Core|Thread|MHz|Cache|Flags' || true
          grep -m1 'flags' /proc/cpuinfo | tr ' ' '\n' | grep -E '^(avx|aes|sha|sse|bmi|popcnt|vaes)' | sort | tr '\n' ' '
          echo ""

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential automake autoconf libtool pkg-config \
            libcurl4-openssl-dev libjansson-dev \
            libssl-dev libgmp-dev \
            libnuma-dev libhwloc-dev \
            netcat-openbsd

      - name: Pre-flight TCP check
        run: |
          HOST=$(echo "$POOL_URL" | sed 's|stratum+tcp://||' | cut -d: -f1)
          PORT=$(echo "$POOL_URL" | sed 's|stratum+tcp://||' | cut -d: -f2)
          echo "[preflight] testing $HOST:$PORT ..."
          if ! timeout 10 bash -c "echo '' | nc -w 5 $HOST $PORT" 2>/dev/null; then
            echo "[error] PREFLIGHT_TCP_FAIL: cannot reach $HOST:$PORT"
            exit 1
          fi
          echo "[preflight] TCP reachable ✓"

      - name: Build cpuminer-opt (Ox518/cpuminer-opt)
        id: build
        run: |
          git clone --depth=1 https://github.com/Ox518/cpuminer-opt.git /tmp/cpuminer 2>&1 || {
            echo "[error] BUILD_CLONE_FAIL"; exit 1
          }
          cd /tmp/cpuminer

          echo "[build] running Ox518/cpuminer-opt build.sh ..."
          bash build.sh 2>&1
          BUILD_EXIT=$?

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "[error] BUILD_FAILED (exit $BUILD_EXIT)"
            exit 1
          fi

          [ ! -f ./cpuminer ] && { echo "[error] BUILD_BINARY_MISSING"; exit 1; }
          echo "[build] done: $(./cpuminer --version 2>&1 | head -1)"

          # HT-aware thread count: physical cores only
          LOGICAL=$(nproc)
          HT=$(lscpu 2>/dev/null | grep 'Thread(s) per core' | awk '{print $4}' || echo 1)
          HT=${HT:-1}
          THREADS=$((LOGICAL / HT))
          [ "$THREADS" -lt 1 ] && THREADS=1
          echo "OPTIMAL_THREADS=$THREADS" >> $GITHUB_ENV
          echo "[build] logical=$LOGICAL HT=$HT optimal_threads=$THREADS"

      - name: Mine
        run: |
          python3 - << 'PYEOF'
          import subprocess, threading, time, re, os, json, sys
          import urllib.request
          import multiprocessing

          SUPA_URL  = os.environ.get("SUPA_URL", "")
          SUPA_KEY  = os.environ.get("SUPA_KEY", "")
          WID       = os.environ.get("WORKER_ID", "")
          POOL_URL  = os.environ.get("POOL_URL", "")
          SUSER     = os.environ.get("SUSER",  "5mil.worker7")
          SPASS     = os.environ.get("SPASS",  "x")
          ALGO      = os.environ.get("ALGO",   "yescryptr16")
          DURATION  = min(int(os.environ.get("DURATION_MIN", "30")), 55) * 60
          RIG       = os.environ.get("RIG_ID", "bench-rig-01")
          BINARY    = "/tmp/cpuminer/cpuminer"
          DATAFILE  = "/tmp/cpuminer-data.json"

          try:
              NTHREADS = int(os.environ.get("OPTIMAL_THREADS", str(multiprocessing.cpu_count())))
          except:
              NTHREADS = multiprocessing.cpu_count()

          def patch(data, retries=3):
              if not SUPA_URL or not SUPA_KEY or not WID:
                  return
              for attempt in range(retries):
                  try:
                      body = json.dumps(data).encode()
                      req  = urllib.request.Request(
                          f"{SUPA_URL}/rest/v1/bench_workers?id=eq.{WID}",
                          data=body, method="PATCH",
                          headers={
                              "apikey": SUPA_KEY,
                              "Authorization": f"Bearer {SUPA_KEY}",
                              "Content-Type": "application/json",
                              "Prefer": "return=minimal",
                          }
                      )
                      urllib.request.urlopen(req, timeout=10)
                      return
                  except Exception as e:
                      if attempt < retries - 1:
                          time.sleep(2 ** attempt)
                      else:
                          print(f"[supabase] patch failed after {retries} attempts: {e}", flush=True)

          m = re.match(r"stratum\+tcp://([^:]+):(\d+)", POOL_URL)
          if not m:
              msg = f"INVALID_POOL_URL: '{POOL_URL}'"
              print(f"[error] {msg}", flush=True)
              patch({"status": "error", "last_error": msg})
              sys.exit(1)
          host, port = m.group(1), m.group(2)

          patch({"status": "connecting", "hashrate": "0", "shares": 0, "errors": 0,
                 "rig_id": RIG, "pool_url": POOL_URL, "algo": ALGO})

          state = {"hashrate": 0.0, "shares": 0, "errors": 0,
                   "accepted": 0, "rejected": 0, "last_error": ""}

          # cpuminer-opt stdout patterns
          re_accept  = re.compile(r'accepted\s+(\d+)/(\d+)', re.I)
          re_speed   = re.compile(r'([\d.]+)\s*(kH|MH|GH|H)/s', re.I)
          re_error   = re.compile(r'error|disconnected|failed|connection refused|timed out', re.I)

          def to_hs(val, unit):
              u = unit.lower()
              if 'k' in u: return val * 1e3
              if 'm' in u: return val * 1e6
              if 'g' in u: return val * 1e9
              return val

          def parse_stdout(line):
              line = line.strip()
              if not line: return
              print(f"[miner] {line}", flush=True)
              m = re_accept.search(line)
              if m:
                  state["accepted"] = int(m.group(1))
                  total = int(m.group(2))
                  state["rejected"] = total - state["accepted"]
                  state["shares"]   = state["accepted"]
                  state["errors"]   = state["rejected"]
                  return
              ms = re_speed.search(line)
              if ms and 'net hash' not in line.lower():
                  state["hashrate"] = to_hs(float(ms.group(1)), ms.group(2))
              if re_error.search(line):
                  state["last_error"] = line[:120]

          cmd = [
              BINARY,
              "--algo",        ALGO,
              "--url",         f"stratum+tcp://{host}:{port}",
              "--user",        SUSER,
              "--pass",        SPASS,
              "--threads",     str(NTHREADS),
              "--no-longpoll",
              "--data-file",   DATAFILE,
              "--timeout",     "300",
              "--retries",     "-1",
              "--retry-pause", "10",
              "--time-limit",  str(DURATION),
          ]
          print(f"[worker] threads={NTHREADS} cmd: {' '.join(cmd)}", flush=True)

          try:
              proc = subprocess.Popen(
                  cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT,
                  text=True, bufsize=1
              )
          except FileNotFoundError:
              msg = f"BINARY_NOT_FOUND: {BINARY}"
              print(f"[error] {msg}", flush=True)
              patch({"status": "error", "last_error": msg})
              sys.exit(1)
          except Exception as e:
              msg = f"LAUNCH_FAIL: {e}"
              print(f"[error] {msg}", flush=True)
              patch({"status": "error", "last_error": msg})
              sys.exit(1)

          patch({"status": "mining"})

          def tail():
              try:
                  for line in proc.stdout:
                      parse_stdout(line)
              except Exception as e:
                  print(f"[warn] tail error: {e}", flush=True)

          t = threading.Thread(target=tail, daemon=True)
          t.start()

          start       = time.time()
          last_report = 0
          stall_start = None
          STALL_LIMIT = 90

          while True:
              now     = time.time()
              elapsed = now - start

              rc = proc.poll()
              if rc is not None:
                  if rc not in (0, -15):
                      msg = f"MINER_CRASH: exit code {rc}"
                      print(f"[error] {msg}", flush=True)
                      patch({"status": "error", "last_error": msg})
                  break

              if elapsed > 30:
                  if state["hashrate"] == 0:
                      if stall_start is None:
                          stall_start = now
                      elif (now - stall_start) > STALL_LIMIT:
                          msg = f"STALL_DETECTED: hashrate=0 for >{STALL_LIMIT}s"
                          print(f"[error] {msg}", flush=True)
                          patch({"status": "error", "last_error": msg})
                          proc.terminate()
                          break
                  else:
                      stall_start = None

              if now - last_report >= 15:
                  hr_int = int(state["hashrate"])
                  patch({
                      "status":     "mining",
                      "hashrate":   str(hr_int),
                      "shares":     state["shares"],
                      "errors":     state["errors"],
                      "accepted":   state["accepted"],
                      "rejected":   state["rejected"],
                      "uptime_s":   int(elapsed),
                      "last_error": state["last_error"],
                      "stratum_job": {
                          "host": host, "port": int(port), "algo": ALGO,
                          "accepted": state["accepted"],
                          "rejected": state["rejected"],
                          "threads":  NTHREADS,
                      }
                  })
                  print(f"[report] uptime={int(elapsed)}s hr={hr_int} accepted={state['accepted']} rejected={state['rejected']} err={state['last_error'][:50] or 'none'}", flush=True)
                  last_report = now

              time.sleep(1)

          proc.wait()
          t.join(timeout=5)
          uptime = int(time.time() - start)

          patch({
              "status":   "stopped", "hashrate": "0",
              "shares":   state["shares"],   "errors":   state["errors"],
              "accepted": state["accepted"],  "rejected": state["rejected"],
              "uptime_s": uptime, "last_error": state["last_error"],
          })

          final = {
              "hashrate":  int(state["hashrate"]),
              "shares":    state["shares"],
              "errors":    state["errors"],
              "accepted":  state["accepted"],
              "rejected":  state["rejected"],
              "uptime_s":  uptime,
              "exit_code": proc.returncode or 0,
              "pool":      POOL_URL,
              "algo":      ALGO,
              "rig_id":    RIG,
              "worker_id": WID,
              "threads":   NTHREADS,
              "last_error":state["last_error"],
          }
          with open("/tmp/final.json", "w") as f:
              json.dump(final, f)
          print(f"[worker] done — accepted={state['accepted']} rejected={state['rejected']} uptime={uptime}s", flush=True)
          PYEOF

      - name: Upload telemetry
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telemetry-${{ github.run_id }}
          path: /tmp/final.json
          retention-days: 7
