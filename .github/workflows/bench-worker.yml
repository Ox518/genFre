name: GitMine Bench Worker

on:
  workflow_dispatch:
    inputs:
      worker_id:
        description: 'bench_workers row UUID'
        required: true
      pool_url:
        description: 'stratum+tcp://host:port'
        required: true
        default: 'stratum+tcp://americas.mining-dutch.nl:9983'
      stratum_user:
        description: 'Stratum username (e.g. 5mil.worker7)'
        required: false
        default: '5mil.worker7'
      stratum_pass:
        description: 'Stratum password'
        required: false
        default: 'x'
      duration:
        description: 'Mining duration in minutes'
        required: false
        default: '30'

jobs:
  mine:
    name: mine
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPA_URL: ${{ secrets.SUPAURL }}
      SUPA_KEY: ${{ secrets.BENCHANONKEY }}
      WORKER_ID: ${{ github.event.inputs.worker_id }}
      POOL_URL: ${{ github.event.inputs.pool_url }}
      SUSER: ${{ github.event.inputs.stratum_user }}
      SPASS: ${{ github.event.inputs.stratum_pass }}
      DURATION_MIN: ${{ github.event.inputs.duration }}
      RIG_ID: bench-rig-01

    steps:
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential automake autoconf pkg-config \
            libcurl4-openssl-dev libjansson-dev \
            libssl-dev libgmp-dev

      - name: Build cpuminer-multi
        run: |
          git clone --depth=1 https://github.com/tpruvot/cpuminer-multi.git /tmp/cpuminer-multi
          cd /tmp/cpuminer-multi
          ./autogen.sh
          ./configure CFLAGS="-O2" --disable-assembly
          make -j$(nproc)
          echo "cpuminer built: $(/tmp/cpuminer-multi/minerd --version | head -1)"

      - name: Mine
        run: |
          python3 - << 'PYEOF'
import subprocess, threading, time, re, os, requests, sys

SUPA_URL  = os.environ["SUPA_URL"]
SUPA_KEY  = os.environ["SUPA_KEY"]
WID       = os.environ["WORKER_ID"]
POOL_URL  = os.environ["POOL_URL"]
SUSER     = os.environ.get("SUSER", "5mil.worker7")
SPASS     = os.environ.get("SPASS", "x")
DURATION  = int(os.environ.get("DURATION_MIN", "30")) * 60
RIG       = os.environ.get("RIG_ID", "bench-rig-01")

HDRS = {
    "apikey": SUPA_KEY,
    "Authorization": f"Bearer {SUPA_KEY}",
    "Content-Type": "application/json",
    "Prefer": "return=minimal"
}

def patch(data):
    try:
        requests.patch(
            f"{SUPA_URL}/rest/v1/bench_workers?id=eq.{WID}",
            json=data, headers=HDRS, timeout=10
        )
    except Exception as e:
        print(f"[supabase] patch error: {e}")

import re as _re
m = _re.match(r"stratum\+tcp://([^:]+):(\d+)", POOL_URL)
if not m:
    print(f"[error] Cannot parse pool URL: {POOL_URL}")
    sys.exit(1)
host, port = m.group(1), m.group(2)

patch({"status": "connecting", "hashrate": "0", "shares": 0, "errors": 0,
       "rig_id": RIG, "pool_url": POOL_URL})

state = {"hashrate": 0.0, "shares": 0, "errors": 0, "accepted": 0, "rejected": 0}

re_accepted = re.compile(r"accepted:\s*(\d+)/(\d+).*?([\d.]+)\s*(kH|MH|H)/s", re.I)
re_yay      = re.compile(r"yay!!!", re.I)
re_boo      = re.compile(r"booooo", re.I)
re_speed    = re.compile(r"(\d+\.?\d*)\s*(kH|MH|GH|H)/s", re.I)

def to_hs(val, unit):
    unit = unit.lower()
    if unit == "kh": return val * 1e3
    if unit == "mh": return val * 1e6
    if unit == "gh": return val * 1e9
    return val

def parse_line(line):
    line = line.strip()
    if not line: return
    print(f"[miner] {line}", flush=True)
    m = re_accepted.search(line)
    if m:
        state["accepted"] = int(m.group(1))
        total = int(m.group(2))
        state["rejected"] = total - state["accepted"]
        state["errors"] = state["rejected"]
        state["shares"] = state["accepted"]
        state["hashrate"] = to_hs(float(m.group(3)), m.group(4))
        return
    if re_yay.search(line): state["shares"] += 1; return
    if re_boo.search(line): state["errors"] += 1; return
    m2 = re_speed.search(line)
    if m2: state["hashrate"] = to_hs(float(m2.group(1)), m2.group(2))

cmd = [
    "/tmp/cpuminer-multi/minerd",
    "--algo", "yescryptr16",
    "--url", f"stratum+tcp://{host}:{port}",
    "--user", SUSER,
    "--pass", SPASS,
    "--threads", "2",
    "--timeout", "300",
    "--retries", "-1",
    "--retry-pause", "10",
    "--reconnect",
]
print(f"[worker] launching: {' '.join(cmd)}", flush=True)

proc = subprocess.Popen(
    cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1
)
patch({"status": "mining"})

def tail():
    for line in proc.stdout:
        parse_line(line)

t = threading.Thread(target=tail, daemon=True)
t.start()

start = time.time()
last_report = 0
while True:
    now = time.time()
    elapsed = now - start
    if elapsed >= DURATION:
        print(f"[worker] duration reached ({DURATION}s), stopping", flush=True)
        proc.terminate()
        break
    if proc.poll() is not None:
        print(f"[worker] cpuminer exited with code {proc.returncode}", flush=True)
        break
    if now - last_report >= 15:
        hr_int = int(state["hashrate"])
        patch({
            "status": "mining",
            "hashrate": str(hr_int),
            "shares": state["shares"],
            "errors": state["errors"],
            "uptime_s": int(elapsed),
            "stratum_job": {
                "host": host, "port": int(port),
                "authorized": True, "difficulty": 1,
                "subscribed": True,
                "accepted": state["accepted"],
                "rejected": state["rejected"],
            }
        })
        print(f"[report] uptime={int(elapsed)}s hr={hr_int} shares={state['shares']} errors={state['errors']}", flush=True)
        last_report = now
    time.sleep(1)

proc.wait()
t.join(timeout=5)
patch({
    "status": "stopped", "hashrate": "0",
    "shares": state["shares"], "errors": state["errors"],
    "uptime_s": int(time.time() - start),
})
print(f"[worker] done. shares={state['shares']} errors={state['errors']}", flush=True)
PYEOF
