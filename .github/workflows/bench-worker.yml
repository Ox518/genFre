name: GitMine Bench Worker

on:
  workflow_dispatch:
    inputs:
      worker_id:
        description: 'bench_workers row UUID (Supabase)'
        required: true
      pool_url:
        description: 'stratum+tcp://host:port  (Fennec/Trinity external pool)'
        required: true
        default: 'stratum+tcp://americas.mining-dutch.nl:9983'
      stratum_user:
        description: 'Stratum username  e.g. 5mil.worker7'
        required: false
        default: '5mil.worker7'
      stratum_pass:
        description: 'Stratum password'
        required: false
        default: 'x'
      duration:
        description: 'Mining duration in minutes  (max 55)'
        required: false
        default: '30'
      algo:
        description: 'Algorithm: yescryptr16 (FNNC) or sha256d (TTY)'
        required: false
        default: 'yescryptr16'

jobs:
  mine:
    name: mine
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPA_URL:     ${{ secrets.SUPAURL }}
      SUPA_KEY:     ${{ secrets.BENCHANONKEY }}
      WORKER_ID:    ${{ github.event.inputs.worker_id }}
      POOL_URL:     ${{ github.event.inputs.pool_url }}
      SUSER:        ${{ github.event.inputs.stratum_user }}
      SPASS:        ${{ github.event.inputs.stratum_pass }}
      DURATION_MIN: ${{ github.event.inputs.duration }}
      ALGO:         ${{ github.event.inputs.algo }}
      RIG_ID:       bench-rig-01

    steps:
      - name: Validate inputs
        run: |
          python3 - << 'PYEOF'
          import os, sys, re
          pool = os.environ.get("POOL_URL", "")
          algo = os.environ.get("ALGO", "yescryptr16")
          dur  = os.environ.get("DURATION_MIN", "30")
          wid  = os.environ.get("WORKER_ID", "")
          errors = []
          if not re.match(r'^stratum\+tcp://[^:]+:\d+$', pool):
              errors.append(f"BAD_POOL_URL: '{pool}' — must be stratum+tcp://host:port")
          if algo not in ("yescryptr16", "sha256d"):
              errors.append(f"BAD_ALGO: '{algo}' — must be yescryptr16 or sha256d")
          try:
              d = int(dur)
              if d < 1 or d > 55:
                  errors.append(f"BAD_DURATION: {d} — must be 1-55 minutes")
          except ValueError:
              errors.append(f"BAD_DURATION: '{dur}' is not an integer")
          if not wid:
              errors.append("MISSING_WORKER_ID: worker_id is required")
          if errors:
              for e in errors:
                  print(f"[error] {e}", flush=True)
              sys.exit(1)
          print(f"[validate] pool={pool} algo={algo} dur={dur}min wid={wid}", flush=True)
          PYEOF

      - name: Enable hugepages
        run: |
          sudo sysctl -w vm.nr_hugepages=128 || true
          echo "Hugepages: $(grep HugePages_Total /proc/meminfo)"

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential automake autoconf libtool pkg-config \
            libcurl4-openssl-dev libjansson-dev \
            libssl-dev libgmp-dev \
            libnuma-dev libhwloc-dev \
            netcat-openbsd

      - name: Pre-flight TCP check
        run: |
          HOST=$(echo "$POOL_URL" | sed 's|stratum+tcp://||' | cut -d: -f1)
          PORT=$(echo "$POOL_URL" | sed 's|stratum+tcp://||' | cut -d: -f2)
          echo "[preflight] testing $HOST:$PORT ..."
          if ! timeout 10 bash -c "echo '' | nc -w 5 $HOST $PORT" 2>/dev/null; then
            echo "[error] PREFLIGHT_TCP_FAIL: cannot reach $HOST:$PORT — aborting to save runner minutes"
            exit 1
          fi
          echo "[preflight] TCP reachable ✓"

      - name: Build cpuminer-opt
        id: build
        run: |
          ALGO="${ALGO:-yescryptr16}"
          echo "[build] cloning cpuminer-opt (JayDDee) for algo=$ALGO"
          git clone --depth=1 https://github.com/JayDDee/cpuminer-opt.git /tmp/cpuminer 2>&1 || {
            echo "[error] BUILD_CLONE_FAIL: git clone failed"
            exit 1
          }
          cd /tmp/cpuminer
          ./build.sh 2>&1 || {
            echo "[build] build.sh failed or missing, trying manual configure"
            ./autogen.sh 2>&1 || { echo "[error] BUILD_AUTOGEN_FAIL"; exit 1; }
            ./configure CFLAGS="-O3 -march=native -funroll-loops -fomit-frame-pointer -fno-strict-aliasing" 2>&1 || { echo "[error] BUILD_CONFIGURE_FAIL"; exit 1; }
            make -j$(nproc) 2>&1 || { echo "[error] BUILD_MAKE_FAIL"; exit 1; }
          }
          if [ ! -f ./cpuminer ]; then
            echo "[error] BUILD_BINARY_MISSING: cpuminer not found after build"
            exit 1
          fi
          strip -s cpuminer
          echo "[build] cpuminer-opt built: $(./cpuminer --version | head -1)"
          echo "[build] supported algos check:"
          ./cpuminer --algo yescryptr16 --help 2>&1 | head -5 || true

      - name: Mine
        run: |
          python3 - << 'PYEOF'
          import subprocess, threading, time, re, os, json, sys
          import urllib.request
          import multiprocessing

          SUPA_URL  = os.environ.get("SUPA_URL", "")
          SUPA_KEY  = os.environ.get("SUPA_KEY", "")
          WID       = os.environ.get("WORKER_ID", "")
          POOL_URL  = os.environ.get("POOL_URL", "")
          SUSER     = os.environ.get("SUSER",  "bench")
          SPASS     = os.environ.get("SPASS",  "x")
          ALGO      = os.environ.get("ALGO",   "yescryptr16")
          DURATION  = min(int(os.environ.get("DURATION_MIN", "30")), 55) * 60
          RIG       = os.environ.get("RIG_ID", "bench-rig-01")
          NPROC     = multiprocessing.cpu_count()
          BINARY    = "/tmp/cpuminer/cpuminer"

          def patch(data, retries=3):
              if not SUPA_URL or not SUPA_KEY or not WID:
                  return
              for attempt in range(retries):
                  try:
                      body = json.dumps(data).encode()
                      req  = urllib.request.Request(
                          f"{SUPA_URL}/rest/v1/bench_workers?id=eq.{WID}",
                          data=body, method="PATCH",
                          headers={
                              "apikey": SUPA_KEY,
                              "Authorization": f"Bearer {SUPA_KEY}",
                              "Content-Type": "application/json",
                              "Prefer": "return=minimal",
                          }
                      )
                      urllib.request.urlopen(req, timeout=10)
                      return
                  except Exception as e:
                      if attempt < retries - 1:
                          time.sleep(2 ** attempt)
                      else:
                          print(f"[supabase] patch failed after {retries} attempts: {e}", flush=True)

          m = re.match(r"stratum\+tcp://([^:]+):(\d+)", POOL_URL)
          if not m:
              msg = f"INVALID_POOL_URL: '{POOL_URL}'"
              print(f"[error] {msg}", flush=True)
              patch({"status": "error", "last_error": msg})
              sys.exit(1)
          host, port = m.group(1), m.group(2)

          patch({"status": "connecting", "hashrate": "0", "shares": 0, "errors": 0,
                 "rig_id": RIG, "pool_url": POOL_URL, "algo": ALGO})

          state = {"hashrate": 0.0, "shares": 0, "errors": 0,
                   "accepted": 0, "rejected": 0, "last_error": ""}

          # cpuminer-opt formats:
          # "5 Accepted 5 S0 R0 B0, 41.452 sec (75ms)"  — cumulative accepted line
          # "TTF @ 539.56 h/s: Block 14h05m, Share 30s" — speed line
          # "Net hash rate (est) 141.69 kh/s"           — network hashrate (ignore)
          re_opt_acc  = re.compile(r'(\d+)\s+Accepted\s+(\d+)\s+S\d+\s+R(\d+)', re.I)
          re_ttf      = re.compile(r'TTF\s*@\s*([\d.]+)\s*(h/s|kh/s|mh/s|gh/s)', re.I)
          re_speed    = re.compile(r'([\d.]+)\s*(kH|MH|GH|H)/s', re.I)
          re_error    = re.compile(r'error|disconnected|rejected|failed|connection refused|timed out', re.I)

          def to_hs(val, unit):
              u = unit.lower().replace('/s','').replace('h','')
              # unit is already stripped to k/m/g or empty
              if 'k' in unit.lower(): return val * 1e3
              if 'm' in unit.lower(): return val * 1e6
              if 'g' in unit.lower(): return val * 1e9
              return val

          def parse_line(line):
              line = line.strip()
              if not line: return
              print(f"[miner] {line}", flush=True)

              # cpuminer-opt accepted line: "5 Accepted 5 S0 R0 B0, ..."
              m = re_opt_acc.search(line)
              if m:
                  state["accepted"]  = int(m.group(2))
                  state["rejected"]  = int(m.group(3))
                  state["shares"]    = state["accepted"]
                  state["errors"]    = state["rejected"]
                  return

              # TTF speed line: "TTF @ 539.56 h/s: ..."
              m2 = re_ttf.search(line)
              if m2:
                  state["hashrate"] = to_hs(float(m2.group(1)), m2.group(2))
                  return

              # fallback speed
              m3 = re_speed.search(line)
              if m3:
                  # skip network hash rate lines
                  if 'net hash' not in line.lower():
                      state["hashrate"] = to_hs(float(m3.group(1)), m3.group(2))

              if re_error.search(line):
                  state["last_error"] = line[:120]

          cmd = [
              BINARY,
              "--algo",        ALGO,
              "--url",         f"stratum+tcp://{host}:{port}",
              "--user",        SUSER,
              "--pass",        SPASS,
              "--threads",     str(NPROC),
              "--timeout",     "300",
              "--retries",     "-1",
              "--retry-pause", "10",
          ]
          print(f"[worker] launching {NPROC} threads: {' '.join(cmd)}", flush=True)

          try:
              proc = subprocess.Popen(
                  cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT,
                  text=True, bufsize=1
              )
          except FileNotFoundError:
              msg = f"BINARY_NOT_FOUND: {BINARY}"
              print(f"[error] {msg}", flush=True)
              patch({"status": "error", "last_error": msg})
              sys.exit(1)
          except Exception as e:
              msg = f"LAUNCH_FAIL: {e}"
              print(f"[error] {msg}", flush=True)
              patch({"status": "error", "last_error": msg})
              sys.exit(1)

          patch({"status": "mining"})

          def tail():
              try:
                  for line in proc.stdout:
                      parse_line(line)
              except Exception as e:
                  print(f"[warn] tail thread error: {e}", flush=True)

          t = threading.Thread(target=tail, daemon=True)
          t.start()

          start       = time.time()
          last_report = 0
          stall_start = None
          STALL_LIMIT = 90

          while True:
              now     = time.time()
              elapsed = now - start

              if elapsed >= DURATION:
                  print(f"[worker] duration reached ({DURATION}s), stopping", flush=True)
                  proc.terminate()
                  break

              rc = proc.poll()
              if rc is not None:
                  if rc not in (0, -15):
                      msg = f"MINER_CRASH: cpuminer exited with code {rc}"
                      print(f"[error] {msg}", flush=True)
                      patch({"status": "error", "last_error": msg})
                  break

              if elapsed > 30:
                  if state["hashrate"] == 0:
                      if stall_start is None:
                          stall_start = now
                      elif (now - stall_start) > STALL_LIMIT:
                          msg = f"STALL_DETECTED: hashrate=0 for >{STALL_LIMIT}s"
                          print(f"[error] {msg}", flush=True)
                          patch({"status": "error", "last_error": msg})
                          proc.terminate()
                          break
                  else:
                      stall_start = None

              if now - last_report >= 15:
                  hr_int = int(state["hashrate"])
                  patch({
                      "status": "mining",
                      "hashrate": str(hr_int),
                      "shares":   state["shares"],
                      "errors":   state["errors"],
                      "uptime_s": int(elapsed),
                      "last_error": state["last_error"],
                      "accepted": state["accepted"],
                      "rejected": state["rejected"],
                      "stratum_job": {
                          "host": host, "port": int(port),
                          "algo": ALGO,
                          "accepted": state["accepted"],
                          "rejected": state["rejected"],
                      }
                  })
                  print(f"[report] uptime={int(elapsed)}s hr={hr_int} shares={state['shares']} accepted={state['accepted']} rejected={state['rejected']} last_error={state['last_error'][:60] or 'none'}", flush=True)
                  last_report = now

              time.sleep(1)

          proc.wait()
          t.join(timeout=5)
          uptime = int(time.time() - start)

          patch({
              "status": "stopped", "hashrate": "0",
              "shares": state["shares"], "errors": state["errors"],
              "uptime_s": uptime, "last_error": state["last_error"],
              "accepted": state["accepted"], "rejected": state["rejected"],
          })

          final = {
              "hashrate":   int(state["hashrate"]),
              "shares":     state["shares"],
              "errors":     state["errors"],
              "uptime_s":   uptime,
              "exit_code":  proc.returncode or 0,
              "pool":       POOL_URL,
              "algo":       ALGO,
              "rig_id":     RIG,
              "worker_id":  WID,
              "threads":    NPROC,
              "last_error": state["last_error"],
              "accepted":   state["accepted"],
              "rejected":   state["rejected"],
          }
          with open("/tmp/final.json", "w") as f:
              json.dump(final, f)
          print(f"[worker] done — shares={state['shares']} accepted={state['accepted']} rejected={state['rejected']} uptime={uptime}s exit={proc.returncode}", flush=True)
          PYEOF

      - name: Upload telemetry
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telemetry-${{ github.run_id }}
          path: /tmp/final.json
          retention-days: 7
