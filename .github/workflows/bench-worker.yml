name: GitMine — Bench Worker

on:
  workflow_dispatch:
    inputs:
      worker_id:
        description: 'Supabase bench_workers row ID to update'
        required: true
      pool_url:
        description: 'Pool base URL (http) or stratum+tcp:// URI'
        required: true
      rig_id:
        description: 'Human-readable rig name'
        required: true
        default: 'bench-rig'
      duration_minutes:
        description: 'How long to mine (max 350)'
        required: false
        default: '30'
      stratum_user:
        description: 'Stratum username (wallet.worker) — leave blank for HTTP pools'
        required: false
        default: ''
      stratum_pass:
        description: 'Stratum password'
        required: false
        default: 'x'

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      SUPA_URL: https://wfabhxfpzqrdhlkidkcl.supabase.co
      SUPA_KEY: ${{ secrets.BENCH_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Install deps
        run: pip install -q requests

      - name: Report online
        run: |
          curl -s -X PATCH \
            "${SUPA_URL}/rest/v1/bench_workers?id=eq.${{ inputs.worker_id }}" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"connecting\",\"hashrate\":0,\"shares\":0,\"errors\":0,\"source\":\"github_actions\",\"runner\":\"${RUNNER_NAME}\",\"pool_url\":\"${{ inputs.pool_url }}\"}"

      - name: Mine
        run: |
          python3 - <<'PYEOF'
          import requests, time, hashlib, os, random, struct, socket, json, re

          SUPA_URL = os.environ['SUPA_URL']
          SUPA_KEY = os.environ['SUPA_KEY']
          WID      = '${{ inputs.worker_id }}'
          POOL_URL = '${{ inputs.pool_url }}'
          DURATION = int('${{ inputs.duration_minutes }}') * 60
          RIG      = '${{ inputs.rig_id }}'
          S_USER   = '${{ inputs.stratum_user }}'
          S_PASS   = '${{ inputs.stratum_pass }}' or 'x'
          IS_STRATUM = POOL_URL.startswith('stratum')

          hdrs = {
              'apikey': SUPA_KEY,
              'Authorization': f'Bearer {SUPA_KEY}',
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
          }

          def patch(data):
              try: requests.patch(f'{SUPA_URL}/rest/v1/bench_workers?id=eq.{WID}', json=data, headers=hdrs, timeout=8)
              except: pass

          # ── Stratum client ────────────────────────────────────────────────
          class Stratum:
              def __init__(self, host, port):
                  self.sock = socket.create_connection((host, port), timeout=15)
                  self.sock.settimeout(30)
                  self.buf  = b''
                  self._id  = 0
                  self.extranonce1      = ''
                  self.extranonce2_size = 4
                  self.difficulty       = 1.0
                  self.job              = None

              def _send(self, obj):
                  self.sock.sendall((json.dumps(obj) + '\n').encode())

              def _readline(self):
                  while b'\n' not in self.buf:
                      chunk = self.sock.recv(4096)
                      if not chunk: raise ConnectionError('disconnected')
                      self.buf += chunk
                  line, self.buf = self.buf.split(b'\n', 1)
                  return json.loads(line.decode())

              def _drain(self, count=10, timeout=15):
                  self.sock.settimeout(timeout)
                  msgs = []
                  try:
                      for _ in range(count):
                          msgs.append(self._readline())
                  except socket.timeout:
                      pass
                  return msgs

              def subscribe(self):
                  self._id += 1
                  self._send({'id': self._id, 'method': 'mining.subscribe', 'params': ['gitmine/1.0']})
                  resp = self._readline()
                  if resp.get('result') and len(resp['result']) >= 3:
                      self.extranonce1      = resp['result'][1] or ''
                      self.extranonce2_size = resp['result'][2] or 4
                  return resp.get('result') is not None

              def authorize(self, user, password='x'):
                  self._id += 1
                  aid = self._id
                  self._send({'id': aid, 'method': 'mining.authorize', 'params': [user, password]})
                  for msg in self._drain(count=15, timeout=15):
                      if msg.get('method') == 'mining.set_difficulty':
                          self.difficulty = float(msg['params'][0])
                      elif msg.get('method') == 'mining.notify':
                          self.job = msg['params']
                      elif msg.get('id') == aid:
                          return msg.get('result') is True
                  return False

              def get_job(self, timeout=10):
                  self.sock.settimeout(timeout)
                  try:
                      for _ in range(30):
                          msg = self._readline()
                          if msg.get('method') == 'mining.notify':
                              self.job = msg['params']
                              return self.job
                          elif msg.get('method') == 'mining.set_difficulty':
                              self.difficulty = float(msg['params'][0])
                  except socket.timeout:
                      pass
                  return self.job

              def submit(self, user, job_id, en2, ntime, nonce_hex):
                  self._id += 1
                  self._send({'id': self._id, 'method': 'mining.submit',
                              'params': [user, job_id, en2, ntime, nonce_hex]})
                  try:
                      resp = self._readline()
                      return resp.get('result') is True
                  except: return False

              def close(self):
                  try: self.sock.close()
                  except: pass

          def parse_stratum_url(url):
              m = re.match(r'stratum\+tcp://([^:]+):(\d+)', url)
              if m: return m.group(1), int(m.group(2))
              raise ValueError(f'Cannot parse: {url}')

          # ════════════════════════════════════════════════════════════════
          # STRATUM MINING
          # ════════════════════════════════════════════════════════════════
          if IS_STRATUM:
              host, port = parse_stratum_url(POOL_URL)
              user       = S_USER or f'{RIG}@gitmine'
              print(f'Connecting stratum: {host}:{port}  user={user}')

              s = Stratum(host, port)
              ok_sub  = s.subscribe()
              ok_auth = s.authorize(user, S_PASS)
              print(f'subscribe={ok_sub}  authorize={ok_auth}  en1={s.extranonce1}  en2_size={s.extranonce2_size}  diff={s.difficulty}')

              patch({'status': 'mining', 'stratum_job': {
                  'host': host, 'port': port,
                  'subscribed': ok_sub, 'authorized': ok_auth,
                  'extranonce1': s.extranonce1, 'difficulty': s.difficulty
              }})

              if not ok_sub:
                  patch({'status': 'err:subscribe failed', 'errors': 1})
                  exit(1)

              start    = time.time()
              shares   = 0
              errors   = 0
              nonces   = 0
              last_rpt = start
              last_job_refresh = start

              while time.time() - start < DURATION:
                  # Refresh job every 55s
                  if time.time() - last_job_refresh > 55:
                      s.get_job(timeout=5)
                      last_job_refresh = time.time()

                  job = s.job
                  if not job:
                      time.sleep(1); continue

                  job_id, prev_hash, coinb1, coinb2, merkle, version, nbits, ntime, clean = (job + [None]*9)[:9]

                  en2_size = s.extranonce2_size
                  en2      = format(random.randint(0, (1 << en2_size*8)-1), f'0{en2_size*2}x')

                  batch = 2000
                  t0    = time.time()
                  for _ in range(batch):
                      nonce_val = random.randint(0, 0xFFFFFFFF)
                      nonce_hex = f'{nonce_val:08x}'
                      # Coinbase hash for header construction
                      en1  = s.extranonce1 or ''
                      try:
                          coinbase_hex = coinb1 + en1 + en2 + coinb2
                          cb_bytes     = bytes.fromhex(coinbase_hex)
                          cb_hash      = hashlib.sha256(hashlib.sha256(cb_bytes).digest()).hexdigest()
                      except Exception:
                          cb_hash = 'ff' * 32
                      # Merkle root (simplified: just use cb_hash with first branch)
                      merkle_root = cb_hash
                      if merkle:
                          for branch in merkle:
                              try:
                                  pair = bytes.fromhex(merkle_root) + bytes.fromhex(branch)
                                  merkle_root = hashlib.sha256(hashlib.sha256(pair).digest()).hexdigest()
                              except: pass
                      # Block header (80 bytes)
                      try:
                          header = bytes.fromhex(
                              (version  or '00000000').ljust(8,'0')[:8] +
                              (prev_hash or '00'*32).ljust(64,'0')[:64] +
                              merkle_root.ljust(64,'0')[:64] +
                              (ntime    or '00000000').ljust(8,'0')[:8] +
                              (nbits    or '00000000').ljust(8,'0')[:8] +
                              nonce_hex
                          )
                          h = hashlib.sha256(hashlib.sha256(header).digest()).hexdigest()
                      except Exception:
                          h = 'ff' * 32
                      nonces += 1
                      # Submit shares meeting difficulty-1 threshold (leading zeros)
                      if h.startswith('0000'):
                          ok = s.submit(user, job_id, en2, ntime or '00000000', nonce_hex)
                          if ok: shares += 1
                          else:  errors += 1

                  hr  = int(batch / (time.time() - t0 or 0.001))
                  now = time.time()
                  if now - last_rpt >= 15:
                      patch({'status': 'mining', 'hashrate': hr, 'shares': shares,
                             'errors': errors, 'uptime_s': int(now - start),
                             'stratum_job': {'host': host, 'port': port, 'subscribed': True,
                                             'authorized': ok_auth, 'extranonce1': s.extranonce1,
                                             'difficulty': s.difficulty, 'job_id': job_id}})
                      print(f'[{int(now-start)}s] {hr} H/s  shares={shares}  errors={errors}  job={job_id}  diff={s.difficulty}')
                      last_rpt = now

              s.close()
              patch({'status':'stopped','hashrate':0,'shares':shares,'errors':errors,'uptime_s':int(time.time()-start)})
              print(f'Stratum done: {shares} shares, {errors} errors, {nonces} nonces')

          # ════════════════════════════════════════════════════════════════
          # HTTP POOL MINING
          # ════════════════════════════════════════════════════════════════
          else:
              def submit_share(nonce, height):
                  try:
                      r = requests.post(f'{POOL_URL}/submit',
                          json={'rig':RIG,'nonce':hex(nonce),'height':height}, timeout=8)
                      return r.status_code in (200,201,202)
                  except: return False

              tmpl = {}
              try:   tmpl = requests.get(f'{POOL_URL}/template.json', timeout=8).json()
              except: patch({'status':'err:template fetch failed','errors':1}); exit(1)

              coin   = tmpl.get('coin','FNNC')
              height = int(tmpl.get('height',0))
              patch({'status':'mining','coin':coin,'algo':tmpl.get('algo','yescryptr16')})

              start    = time.time()
              nonce    = random.randint(0,0xFFFFFFFF)
              shares   = 0; errors = 0; last_rpt = start

              while time.time() - start < DURATION:
                  batch = 5000; t0 = time.time()
                  for _ in range(batch):
                      nonce = (nonce+1) & 0xFFFFFFFF
                      data  = struct.pack('>I',nonce) + RIG.encode()[:28]
                      h     = hashlib.sha256(hashlib.sha256(data).digest()).hexdigest()
                      if h.startswith('0000'):
                          if submit_share(nonce,height): shares += 1
                          else: errors += 1
                  hr  = int(batch/(time.time()-t0 or 0.001))
                  now = time.time()
                  if now - last_rpt >= 15:
                      patch({'status':'mining','hashrate':hr,'shares':shares,'errors':errors,'uptime_s':int(now-start)})
                      last_rpt = now

              patch({'status':'stopped','hashrate':0,'shares':shares,'errors':errors,'uptime_s':int(time.time()-start)})
              print(f'HTTP done: {shares} shares, {errors} errors')
          PYEOF

      - name: Report stopped
        if: always()
        run: |
          curl -s -X PATCH \
            "${SUPA_URL}/rest/v1/bench_workers?id=eq.${{ inputs.worker_id }}" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"stopped","hashrate":0}'
