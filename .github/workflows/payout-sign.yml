name: Payout Broadcast
# Triggered when pool operator signs a payout (pushes to payouts/signed/)
on:
  push:
    branches: ['payouts/signed']
  workflow_dispatch:
    inputs:
      payout_file:
        description: 'Payout file to broadcast (e.g. payouts/signed/2026-06-06.json)'
        required: true

permissions:
  contents: write

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Broadcast signed payout transactions
        run: |
          python scripts/broadcast_payouts.py \
            --signed-dir payouts/signed/ \
            --broadcast-dir payouts/broadcast/ \
            --rpc-url ${{ secrets.PUBLIC_RPC_URL || 'https://explorer.trinity-coin.org/api/sendtx' }}

      - name: Commit broadcast receipts
        run: |
          git config user.name "gitmine-bot"
          git config user.email "gitmine-bot@users.noreply.github.com"
          git add payouts/broadcast/
          git diff --staged --quiet || git commit -m "payout: broadcast $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
