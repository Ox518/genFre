name: GitMine Diagnostics
# Triggered automatically after every bench-worker run.
# Also triggerable manually for a full platform health report.

on:
  workflow_run:
    workflows: ["GitMine Bench Worker"]
    types: [completed]
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note'
        required: false
        default: 'manual'

jobs:
  diagnose:
    name: diagnose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read

    steps:
      - name: Fetch recent telemetry artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/diag
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bench-worker.yml/runs?status=completed&per_page=10" \
            > /tmp/diag/runs.json

          python3 - << 'PYEOF'
import urllib.request, subprocess, json, os

token = os.environ["GH_TOKEN"]
repo  = os.environ.get("GITHUB_REPOSITORY", "Ox518/genFre")

try:
    with open("/tmp/diag/runs.json") as f:
        runs_data = json.load(f)
except Exception as e:
    print(f"[error] Could not read runs.json: {e}")
    runs_data = {}

runs = runs_data.get("workflow_runs", [])[:10]
print(f"Found {len(runs)} completed bench-worker runs")
logs = []

for run in runs:
    run_id = run["id"]
    req = urllib.request.Request(
        f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts",
        headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}
    )
    try:
        with urllib.request.urlopen(req, timeout=10) as resp:
            artifacts = json.loads(resp.read())
    except Exception as e:
        print(f"[warn] artifacts for run {run_id}: {e}")
        continue
    for art in artifacts.get("artifacts", []):
        if art["name"].startswith("telemetry-"):
            zip_path = f"/tmp/diag/{run_id}.zip"
            result = subprocess.run(
                ["curl", "-s", "-L", "-o", zip_path,
                 "-H", f"Authorization: Bearer {token}",
                 art["archive_download_url"]],
                capture_output=True
            )
            if result.returncode != 0:
                print(f"[warn] download failed for run {run_id}")
                break
            out_dir = f"/tmp/diag/{run_id}"
            subprocess.run(["unzip", "-o", "-q", zip_path, "-d", out_dir])
            jp = f"{out_dir}/final.json"
            if os.path.exists(jp):
                try:
                    with open(jp) as jf:
                        tel = json.load(jf)
                    tel["_gh_conclusion"] = run["conclusion"]
                    tel["_gh_run_url"]    = run["html_url"]
                    tel["_gh_run_id"]     = run_id
                    logs.append(tel)
                    print(f"[ok] telemetry run {run_id}")
                except json.JSONDecodeError as e:
                    print(f"[warn] corrupt telemetry JSON run {run_id}: {e}")
            else:
                print(f"[warn] final.json missing for run {run_id}")
            break

with open("/tmp/diag/all_logs.json", "w") as f:
    json.dump(logs, f, indent=2)
print(f"Loaded {len(logs)} telemetry records")
PYEOF

      - name: Analyse and write report
        if: always()
        run: |
          python3 - << 'PYEOF'
import json, os

try:
    with open("/tmp/diag/all_logs.json") as f:
        logs = json.load(f)
except Exception as e:
    logs = []
    print(f"[warn] could not load telemetry: {e}")

def icon(ok): return "✅" if ok else "❌"

lines = []
lines.append("# GitMine Platform Diagnostic Report")
lines.append(f"_Analysed {len(logs)} recent bench-worker runs_")
lines.append("")

if not logs:
    lines.append("## ⚠️ No Telemetry Found")
    lines.append("")
    lines.append("No completed bench-worker runs with telemetry artifacts were found.")
    lines.append("")
    lines.append("**Possible causes:**")
    lines.append("- `bench-worker` has never been dispatched")
    lines.append("- Workflow fails before the Mine step (build error, TCP fail)")
    lines.append("- Supabase secrets (`SUPAURL`, `BENCHANONKEY`) not set")
    lines.append("- `final.json` not written (Python crash in Mine step)")
    lines.append("")
    lines.append("**Next steps:**")
    lines.append("1. Go to Actions → *GitMine Bench Worker* → Run workflow")
    lines.append("2. Check the workflow logs for errors in Validate, Pre-flight, or Build steps")
    lines.append("3. Run *GitMine Bench DEBUG* for a full diagnostic trace")
else:
    total          = len(logs)
    had_shares     = sum(1 for l in logs if l.get("shares", 0) > 0)
    total_shares   = sum(l.get("shares", 0) for l in logs)
    total_errors   = sum(l.get("errors", 0) for l in logs)
    total_rejected = sum(l.get("rejected", 0) for l in logs)
    avg_uptime     = sum(l.get("uptime_s", 0) for l in logs) / total
    avg_hr         = sum(l.get("hashrate", 0) for l in logs) / total
    exit_codes     = [l.get("exit_code") for l in logs]
    bad_exits      = [c for c in exit_codes if c not in (0, None, -15)]
    stalled        = sum(1 for l in logs if "STALL" in str(l.get("last_error", "")))
    crashed        = sum(1 for l in logs if "CRASH" in str(l.get("last_error", "")))

    lines.append("## Health Overview")
    lines.append("| Check | Value | Status |")
    lines.append("|---|---|---|")
    lines.append(f"| Runs analysed         | {total}               | — |")
    lines.append(f"| Runs with shares      | {had_shares}/{total}  | {icon(had_shares == total)} |")
    lines.append(f"| Total shares found    | {total_shares}        | {icon(total_shares > 0)} |")
    lines.append(f"| Total share errors    | {total_errors}        | {'✅' if total_errors == 0 else '⚠️'} |")
    lines.append(f"| Total rejected        | {total_rejected}      | {'✅' if total_rejected == 0 else '⚠️'} |")
    lines.append(f"| Bad exit codes        | {bad_exits or 'none'} | {icon(not bad_exits)} |")
    lines.append(f"| Stall events          | {stalled}             | {'✅' if stalled == 0 else '❌'} |")
    lines.append(f"| Crash events          | {crashed}             | {'✅' if crashed == 0 else '❌'} |")
    lines.append(f"| Avg uptime            | {avg_uptime:.0f}s     | — |")
    lines.append(f"| Avg hashrate          | {avg_hr:.0f} H/s      | — |")
    lines.append("")

    issues = []
    if had_shares == 0:
        issues.append(("❌ CRITICAL", "No shares accepted across all runs",
            "Workers connect but never find valid shares. Possible: algo mismatch, difficulty too high, pool not sending jobs, or stall before first job."))
    elif had_shares < total:
        issues.append(("⚠️ WARN", f"Only {had_shares}/{total} runs produced shares",
            "Some runs produced no shares. Check for intermittent pool connectivity or algo/credential mismatches on failing runs."))
    if total_rejected > max(total_shares * 0.1, 1):
        issues.append(("⚠️ WARN", f"High rejection rate ({total_rejected} rejected / {total_shares} accepted)",
            "More than 10% of shares rejected. Possible: clock skew, stale jobs, or difficulty mismatch."))
    if stalled > 0:
        issues.append(("❌ CRITICAL", f"{stalled} stall event(s) detected",
            "Miner connected but hashrate=0 for >90s. Possible: pool not sending jobs after auth, algo not supported, or stratum subscription failing silently."))
    if crashed > 0:
        issues.append(("❌ CRITICAL", f"{crashed} miner crash(es) detected",
            "cpuminer exited with non-zero code. Run bench-debug for full output. Possible: segfault in AVX2 path, OOM, or missing hugepages."))
    if bad_exits:
        issues.append(("⚠️ WARN", f"Unexpected exit codes: {set(bad_exits)}",
            "cpuminer exited abnormally. Code 1=error, 139=segfault. Check miner output in bench-worker logs."))

    if issues:
        lines.append("## 🔍 Issues Found")
        for sev, title, detail in issues:
            lines.append(f"### {sev}: {title}")
            lines.append(f"> {detail}")
            lines.append("")
    else:
        lines.append("## ✅ Platform Healthy — No Issues Found")
        lines.append("")

    lines.append("## Per-Run Detail")
    lines.append("| Run | Algo | Shares | Rejected | Hashrate | Uptime | Exit | Last Error | Link |")
    lines.append("|---|---|---|---|---|---|---|---|---|")
    for l in logs:
        shr  = l.get("shares", 0)
        rej  = l.get("rejected", 0)
        hr   = f"{l.get('hashrate', 0)} H/s"
        up   = f"{l.get('uptime_s', 0)}s"
        ex   = str(l.get("exit_code", "?"))
        algo = l.get("algo", "?")
        le   = (l.get("last_error") or "")[:40]
        url  = f"[view]({l.get('_gh_run_url','#')})"
        rid  = str(l.get("_gh_run_id", "?"))[-6:]
        lines.append(f"| ...{rid} | {algo} | {shr} | {rej} | {hr} | {up} | {ex} | {le} | {url} |")
    lines.append("")

    if logs:
        le = logs[0].get("last_error", "")
        if le:
            lines.append("## Last Error (most recent run)")
            lines.append(f"```\n{le}\n```")
            lines.append("")

    lines.append("> **Note:** Fennec (FNNC) and Trinity (TTY) use external Stratum pools.")
    lines.append("> No GitMine wallet configuration is required for bench workers on these coins.")

summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/diag/summary.md")
with open(summary_path, "a") as f:
    f.write("\n".join(lines) + "\n")
print("Diagnostic report written.")
PYEOF
