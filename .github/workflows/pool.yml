name: GitMine — Pool Operator (FNNC + TTY)

on:
  schedule:
    - cron: '*/2 * * * *'       # Template refresh every 2 minutes
  push:
    branches:
      - shares-pending           # Trigger immediately on new shares
      - 'fleet/**/heartbeat'     # Trigger on rig heartbeats
  workflow_dispatch:
    inputs:
      force_payout:
        description: 'Force payout processing regardless of threshold'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pool-operator
  cancel-in-progress: false

jobs:
  operate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Fennec (FNNC) — YescryptR16
      FNNC_RPC_PORT: 8339
      FNNC_RPC_USER: fnncpool
      FNNC_RPC_PASS: ${{ secrets.FNNC_RPC_PASS }}
      FNNC_POOL_ADDRESS: ${{ secrets.FNNC_POOL_ADDRESS }}
      # Trinity (TTY) — SHA256d
      TTY_RPC_PORT: 12345
      TTY_RPC_USER: ttypool
      TTY_RPC_PASS: ${{ secrets.TTY_RPC_PASS }}
      TTY_POOL_ADDRESS: ${{ secrets.TTY_POOL_ADDRESS }}
      # Relay bridge
      RELAY_SECRET: ${{ secrets.RELAY_SECRET }}
      RELAY_URL: ${{ secrets.RELAY_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pool operator dependencies
        run: pip install -r scripts/requirements.txt

      # ── Fennec daemon ────────────────────────────────────────────
      - name: Cache Fennec daemon
        uses: actions/cache@v4
        id: fennecd-cache
        with:
          path: ~/.fennecd/fennecd
          key: fennecd-v1.0-${{ runner.os }}

      - name: Build Fennec daemon (if not cached)
        if: steps.fennecd-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-fennecd.sh

      - name: Start Fennec daemon
        run: |
          ~/.fennecd/fennecd \
            -prune=550 \
            -rpcbind=127.0.0.1 \
            -rpcport=${{ env.FNNC_RPC_PORT }} \
            -rpcuser=${{ env.FNNC_RPC_USER }} \
            -rpcpassword=${{ env.FNNC_RPC_PASS }} \
            -daemon
          for i in $(seq 1 12); do
            sleep 5
            ~/.fennecd/fennecd-cli -rpcport=${{ env.FNNC_RPC_PORT }} \
              -rpcuser=${{ env.FNNC_RPC_USER }} -rpcpassword=${{ env.FNNC_RPC_PASS }} \
              getblockcount && break || true
          done

      # ── Trinity daemon ────────────────────────────────────────────
      - name: Cache Trinity daemon
        uses: actions/cache@v4
        id: trinityd-cache
        with:
          path: ~/.trinityd/trinityd
          key: trinityd-v1.0-${{ runner.os }}

      - name: Build Trinity daemon (if not cached)
        if: steps.trinityd-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-trinityd.sh

      - name: Start Trinity daemon
        run: |
          ~/.trinityd/trinityd \
            -prune=550 \
            -rpcbind=127.0.0.1 \
            -rpcport=${{ env.TTY_RPC_PORT }} \
            -rpcuser=${{ env.TTY_RPC_USER }} \
            -rpcpassword=${{ env.TTY_RPC_PASS }} \
            -daemon
          for i in $(seq 1 12); do
            sleep 5
            ~/.trinityd/trinityd-cli -rpcport=${{ env.TTY_RPC_PORT }} \
              -rpcuser=${{ env.TTY_RPC_USER }} -rpcpassword=${{ env.TTY_RPC_PASS }} \
              getblockcount && break || true
          done

      # ── Pool logic ────────────────────────────────────────────────
      - name: Fetch block templates (FNNC + TTY)
        run: python scripts/fetch_templates.py

      - name: Select active template (round-robin)
        run: python scripts/select_template.py

      - name: Validate pending shares
        run: python scripts/validate_shares.py

      - name: Update pool stats
        run: python scripts/update_stats.py

      - name: Process payouts
        run: |
          FORCE_PAYOUT=${{ inputs.force_payout || 'false' }} \
            python scripts/process_payouts.py

      - name: Commit updated state
        run: |
          git config user.name "gitmine-bot"
          git config user.email "bot@gitmine-tty"
          git add docs/template.json docs/stats.json docs/payouts.json state/ payouts/ || true
          git diff --staged --quiet || git commit -m "pool: state update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main

      - name: Create template tag
        run: |
          COIN=$(python -c "import json; print(json.load(open('docs/template.json'))['coin'])")
          HEIGHT=$(python -c "import json; print(json.load(open('docs/template.json'))['height'])")
          ALGO=$(python -c "import json; print(json.load(open('docs/template.json'))['algo'])")
          TAG="template-${COIN}-${ALGO}-${HEIGHT}"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

      - name: Notify Relay bridge
        if: env.RELAY_URL != ''
        run: |
          COIN=$(python -c "import json; print(json.load(open('docs/template.json'))['coin'])")
          HEIGHT=$(python -c "import json; print(json.load(open('docs/template.json'))['height'])")
          ALGO=$(python -c "import json; print(json.load(open('docs/template.json'))['algo'])")
          curl -s -X POST "${{ env.RELAY_URL }}/broadcast" \
            -H "Authorization: Bearer ${{ env.RELAY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"state_update\",\"coin\":\"${COIN}\",\"algo\":\"${ALGO}\",\"height\":${HEIGHT}}" || true

      - name: Deploy dashboard to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: docs
        continue-on-error: true
