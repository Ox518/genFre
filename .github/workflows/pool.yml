name: GitMine TTY — Pool Operator

on:
  schedule:
    - cron: '*/2 * * * *'       # Template refresh every 2 minutes
  push:
    branches:
      - shares-pending           # Trigger immediately on new shares
      - 'fleet/**/heartbeat'     # Trigger on rig heartbeats
  workflow_dispatch:             # Manual trigger
    inputs:
      force_payout:
        description: 'Force payout processing regardless of threshold'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pool-operator
  cancel-in-progress: false    # Never cancel mid-run — share validation must complete

jobs:
  operate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TRINITY_RPC_PORT: 12345
      TRINITY_RPC_USER: ttypool
      TRINITY_RPC_PASS: ${{ secrets.TRINITY_RPC_PASS }}
      POOL_ADDRESS: ${{ secrets.POOL_ADDRESS }}
      FENNEC_SECRET: ${{ secrets.FENNEC_SECRET }}
      FENNEC_URL: ${{ secrets.FENNEC_URL }}

    steps:
      - name: Checkout repo (full history for share branch inspection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pool operator dependencies
        run: |
          pip install \  
            pyyaml \          # Config parsing
            requests \        # RPC calls
            python-bitcoinrpc \  # Trinity RPC client
            py-scrypt \       # Scrypt validation
            pygroestl \       # Myr-Groestl validation
            pynacl            # Ed25519 signature verification

      - name: Cache Trinity daemon binary
        uses: actions/cache@v4
        id: trinityd-cache
        with:
          path: ~/.trinityd/trinityd
          key: trinityd-v1.0-${{ runner.os }}

      - name: Build Trinity daemon (if not cached)
        if: steps.trinityd-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y build-essential libssl-dev libboost-all-dev libdb++-dev
          # Build from source (pinned commit)
          git clone --depth 1 https://github.com/REPLACE_WITH_TRINITY_REPO trinityd-src
          cd trinityd-src && ./autogen.sh && ./configure --with-incompatible-bdb --without-gui
          make -j$(nproc)
          mkdir -p ~/.trinityd && cp src/trinityd ~/.trinityd/

      - name: Start Trinity daemon (pruned, 550 blocks)
        run: |
          ~/.trinityd/trinityd \
            -prune=550 \
            -sync-pruned-blocks \
            -rpcbind=127.0.0.1 \
            -rpcport=${{ env.TRINITY_RPC_PORT }} \
            -rpcuser=${{ env.TRINITY_RPC_USER }} \
            -rpcpassword=${{ env.TRINITY_RPC_PASS }} \
            -daemon
          # Wait for RPC to be ready (up to 60s)
          for i in $(seq 1 12); do
            sleep 5
            ~/.trinityd/trinityd-cli -rpcport=${{ env.TRINITY_RPC_PORT }} \
              -rpcuser=${{ env.TRINITY_RPC_USER }} -rpcpassword=${{ env.TRINITY_RPC_PASS }} \
              getblockcount && break || true
          done

      - name: Fetch block templates for all algos
        run: python scripts/fetch_templates.py

      - name: Select and publish active template
        run: python scripts/select_template.py

      - name: Validate pending shares
        run: python scripts/validate_shares.py

      - name: Update aggregated pool stats
        run: python scripts/update_stats.py

      - name: Process payouts
        run: |
          FORCE_PAYOUT=${{ inputs.force_payout || 'false' }} \
            python scripts/process_payouts.py

      - name: Commit updated state to main
        run: |
          git config user.name "gitmine-bot"
          git config user.email "bot@gitmine-tty"
          git add docs/template.json docs/stats.json docs/payouts.json state/ payouts/ || true
          git diff --staged --quiet || git commit -m "pool: state update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main

      - name: Create signed template tag
        run: |
          HEIGHT=$(python -c "import json; print(json.load(open('docs/template.json'))['height'])")
          ALGO=$(python -c "import json; print(json.load(open('docs/template.json'))['algo'])")
          TAG="template-${ALGO}-${HEIGHT}"
          # Only tag if it doesn't exist
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

      - name: Notify Fennec bridge (self-hosted real-time)
        if: env.FENNEC_URL != ''
        run: |
          HEIGHT=$(python -c "import json; print(json.load(open('docs/template.json'))['height'])")
          ALGO=$(python -c "import json; print(json.load(open('docs/template.json'))['algo'])")
          curl -s -X POST "${{ env.FENNEC_URL }}/broadcast" \
            -H "Authorization: Bearer ${{ env.FENNEC_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"state_update\",\"algo\":\"${ALGO}\",\"height\":${HEIGHT}}" || true
          # Non-fatal: pool still operates if Fennec is offline

      - name: Deploy dashboard to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: docs
        continue-on-error: true  # Non-fatal if Pages not enabled yet
