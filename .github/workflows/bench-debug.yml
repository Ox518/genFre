name: GitMine Bench DEBUG

on:
  workflow_dispatch:
    inputs:
      pool_url:
        description: 'stratum+tcp://host:port'
        required: false
        default: 'stratum+tcp://americas.mining-dutch.nl:9983'
      stratum_user:
        description: 'Stratum username'
        required: false
        default: '5mil.worker7'
      stratum_pass:
        description: 'Stratum password'
        required: false
        default: 'x'
      duration:
        description: 'Mining duration seconds'
        required: false
        default: '120'

jobs:
  debug:
    name: debug
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Init log
        run: |
          mkdir -p /tmp/diag
          LOG=/tmp/diag/bench-debug.log
          echo "BENCH-DEBUG LOG" > $LOG
          echo "run_id   : ${{ github.run_id }}" >> $LOG
          echo "run_url  : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $LOG
          echo "timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $LOG
          echo "pool_url : ${{ github.event.inputs.pool_url }}" >> $LOG
          echo "user     : ${{ github.event.inputs.stratum_user }}" >> $LOG
          echo "duration : ${{ github.event.inputs.duration }}s" >> $LOG
          echo "runner   : $(uname -a)" >> $LOG
          echo "cpus     : $(nproc)" >> $LOG
          echo "ram      : $(free -h | awk '/Mem/{print $2}')" >> $LOG
          echo "cpu_flags: $(grep -m1 flags /proc/cpuinfo | grep -oE 'avx[^ ]*|sse[^ ]*' | tr '\n' ' ')" >> $LOG
          echo "" >> $LOG

      - name: "[1] TCP stratum handshake"
        run: |
          LOG=/tmp/diag/bench-debug.log
          HOST=$(echo "${{ github.event.inputs.pool_url }}" | sed 's|stratum+tcp://||' | cut -d: -f1)
          PORT=$(echo "${{ github.event.inputs.pool_url }}" | sed 's|stratum+tcp://||' | cut -d: -f2)
          echo "=== [1] RAW TCP STRATUM HANDSHAKE ===" >> $LOG
          echo "host=$HOST port=$PORT" >> $LOG
          RESULT=$(timeout 15 bash -c "(
            printf '{"id":1,"method":"mining.subscribe","params":["cpuminer/2.5"]}\n'
            sleep 3
            printf '{"id":2,"method":"mining.authorize","params":["${{ github.event.inputs.stratum_user }}","${{ github.event.inputs.stratum_pass }}"]}\n'
            sleep 5
          ) | nc $HOST $PORT 2>&1" || true)
          echo "$RESULT" >> $LOG
          if echo "$RESULT" | grep -q '"result":true'; then
            echo "TCP_AUTH=AUTHORIZED" >> $LOG
          elif echo "$RESULT" | grep -q '"result":false'; then
            echo "TCP_AUTH=REJECTED" >> $LOG
          elif echo "$RESULT" | grep -q 'mining.notify'; then
            echo "TCP_AUTH=GOT_JOB_NO_AUTH_RESPONSE" >> $LOG
          elif [ -z "$RESULT" ]; then
            echo "TCP_AUTH=NO_RESPONSE_CONNECTION_REFUSED" >> $LOG
          else
            echo "TCP_AUTH=UNKNOWN" >> $LOG
          fi
          echo "" >> $LOG

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential automake autoconf pkg-config \
            libcurl4-openssl-dev libjansson-dev \
            libssl-dev libgmp-dev

      - name: "[2] Build cpuminer-yescryptr16 (AVX2)"
        run: |
          LOG=/tmp/diag/bench-debug.log
          echo "=== [2] BUILD CPUMINER (yescryptr16 + AVX2) ===" >> $LOG
          git clone --depth=1 https://github.com/5mil/cpuminer-yescryptr16.git /tmp/cpuminer 2>&1 | tail -3 >> $LOG
          cd /tmp/cpuminer
          ./autogen.sh >> $LOG 2>&1
          ./configure \
            CFLAGS="-O3 -march=native -mavx2 -maes -msse4.2 -funroll-loops -fomit-frame-pointer -falign-functions=16 -fno-strict-aliasing" \
            --enable-assembly >> $LOG 2>&1
          make -j$(nproc) >> $LOG 2>&1
          BUILD_EXIT=$?
          echo "build_exit=$BUILD_EXIT" >> $LOG
          strip -s /tmp/cpuminer/minerd 2>/dev/null || true
          if [ $BUILD_EXIT -eq 0 ]; then
            VERSION=$(/tmp/cpuminer/minerd --version 2>&1 | head -1)
            echo "version=$VERSION" >> $LOG
            echo "cpu_simd=$(grep -m1 flags /proc/cpuinfo | grep -oE 'avx[^ ]*' | head -3 | tr '\n' ' ')" >> $LOG
          else
            echo "BUILD FAILED — check log above" >> $LOG
          fi
          echo "" >> $LOG

      - name: "[3] Mine with --debug"
        run: |
          LOG=/tmp/diag/bench-debug.log
          HOST=$(echo "${{ github.event.inputs.pool_url }}" | sed 's|stratum+tcp://||' | cut -d: -f1)
          PORT=$(echo "${{ github.event.inputs.pool_url }}" | sed 's|stratum+tcp://||' | cut -d: -f2)
          DURATION=${{ github.event.inputs.duration }}
          echo "=== [3] CPUMINER --debug OUTPUT ===" >> $LOG
          timeout $DURATION /tmp/cpuminer/minerd \
            --algo yescryptr16 \
            --url stratum+tcp://$HOST:$PORT \
            --user ${{ github.event.inputs.stratum_user }} \
            --pass ${{ github.event.inputs.stratum_pass }} \
            --threads $(nproc) \
            --timeout 300 \
            --retries -1 \
            --retry-pause 10 \
            --reconnect \
            --debug \
            2>&1 | tee -a $LOG || true
          echo "mine_exit=$?" >> $LOG
          echo "" >> $LOG

      - name: "[4] Parse results + write summary"
        if: always()
        run: |
          LOG=/tmp/diag/bench-debug.log
          echo "=== [4] PARSED SUMMARY ===" >> $LOG
          TCP_AUTH=$(grep 'TCP_AUTH=' $LOG | cut -d= -f2)
          BUILD_OK=$(grep 'build_exit=' $LOG | cut -d= -f2)
          MINE_EXIT=$(grep 'mine_exit=' $LOG | tail -1 | cut -d= -f2)
          HASHRATE=$(grep -oP '[\d.]+\s*(kH|MH|GH|H)/s' $LOG | tail -1)
          ACCEPTED=$(grep -ci 'accepted' $LOG || echo 0)
          ERRORS=$(grep -ci 'error\|disconnected\|rejected\|failed' $LOG || echo 0)
          LAST_ERROR=$(grep -i 'error\|disconnected\|rejected\|failed' $LOG | tail -3)
          CPU_SIMD=$(grep 'cpu_simd=' $LOG | cut -d= -f2)

          echo "tcp_auth     : $TCP_AUTH"  >> $LOG
          echo "build_exit   : $BUILD_OK"  >> $LOG
          echo "mine_exit    : $MINE_EXIT" >> $LOG
          echo "hashrate     : $HASHRATE"  >> $LOG
          echo "shares       : $ACCEPTED"  >> $LOG
          echo "errors       : $ERRORS"    >> $LOG
          echo "simd_active  : $CPU_SIMD"  >> $LOG

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
## GitMine Bench Debug Results
| Check | Result |
|---|---|
| TCP Auth | $TCP_AUTH |
| Build Exit | $BUILD_OK |
| Mine Exit | $MINE_EXIT |
| Hashrate | $HASHRATE |
| Shares Accepted | $ACCEPTED |
| Error Count | $ERRORS |
| SIMD Active | $CPU_SIMD |

### Last Errors
\`\`\`
$LAST_ERROR
\`\`\`
SUMMARY
          cat $LOG

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-debug-${{ github.run_id }}
          path: /tmp/diag/bench-debug.log
          retention-days: 7
