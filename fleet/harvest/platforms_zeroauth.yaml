# GitMine Scavenger — Zero-Auth / No-Login Platform Registry
# These platforms auto-enroll even if no secrets are configured.
# Platforms marked no_secret_required: true will always be attempted.

platforms_zeroauth:

  cloudflare_workers:
    type: edge_function
    url: https://workers.cloudflare.com
    free_req_day: 100000
    free_req_month: null
    cpu_ms_per_req: 10
    resets: daily
    deploy_method: wrangler_or_api
    enroll_script: scripts/enrollers/cloudflare_workers.py
    no_secret_required: false   # needs CF_API_TOKEN (free account)
    optional_secret: CF_API_TOKEN
    max_workers: 30
    priority: high
    notes: "100K req/day forever free. No credit card. Runs in 300 PoPs."

  deno_deploy:
    type: edge_function
    url: https://deno.com/deploy
    free_req_month: 1000000
    resets: monthly
    deploy_method: deployctl_or_api
    enroll_script: scripts/enrollers/deno_deploy.py
    no_secret_required: false   # needs DENO_DEPLOY_TOKEN (free account)
    optional_secret: DENO_DEPLOY_TOKEN
    max_workers: 20
    priority: high
    notes: "1M req/month free. No credit card. Instant global deploy."

  netlify_functions:
    type: serverless
    url: https://netlify.com
    free_invocations_month: 125000
    free_bandwidth_gb: 100
    resets: monthly
    deploy_method: netlify_api
    enroll_script: scripts/enrollers/netlify_functions.py
    no_secret_required: false
    optional_secret: NETLIFY_AUTH_TOKEN
    max_workers: 10
    priority: medium
    notes: "125K invocations/month. No credit card required."

  vercel_functions:
    type: serverless
    url: https://vercel.com
    free_invocations_month: 1000000
    resets: monthly
    deploy_method: vercel_api
    enroll_script: scripts/enrollers/vercel_functions.py
    no_secret_required: false
    optional_secret: VERCEL_TOKEN
    max_workers: 10
    priority: medium
    notes: "Hobby plan free forever. No credit card."

  glitch:
    type: app_host
    url: https://glitch.com
    free_hours: unlimited
    resets: never
    deploy_method: remix_api
    enroll_script: scripts/enrollers/glitch.py
    no_secret_required: true   # public remix works without auth token
    optional_secret: GLITCH_AUTH_TOKEN
    max_workers: 20
    priority: medium
    notes: "No login needed to remix public projects. Always-on hobby tier."

  codesandbox:
    type: cloud_dev
    url: https://codesandbox.io
    resets: never
    deploy_method: api
    enroll_script: scripts/enrollers/codesandbox.py
    no_secret_required: false
    optional_secret: CODESANDBOX_TOKEN
    max_workers: 10
    priority: low
    notes: "Free unlimited public sandboxes. Server VMs need token."

  pythonanywhere:
    type: web_host
    url: https://pythonanywhere.com
    free_tier: beginner
    resets: never
    deploy_method: api
    enroll_script: scripts/enrollers/pythonanywhere.py
    no_secret_required: false
    optional_secret: PYTHONANYWHERE_TOKEN
    max_workers: 5
    priority: medium
    notes: "Free Python hosting forever. Scheduled daily tasks."

  github_codespaces:
    type: cloud_dev
    url: https://github.com/codespaces
    free_core_hours_month: 120
    resets: monthly
    deploy_method: github_api
    enroll_script: scripts/enrollers/github_codespaces.py
    no_secret_required: false
    optional_secret: HARVEST_GH_TOKEN_0
    max_workers: 5
    priority: high
    notes: "120 core-hrs/month free per account. 2-core = 60 hrs wall time."

  aws_lambda_free:
    type: serverless
    url: https://aws.amazon.com/lambda
    free_requests_month: 1000000
    free_compute_gb_sec: 400000
    resets: monthly
    deploy_method: boto3
    enroll_script: scripts/enrollers/aws_lambda_free.py
    no_secret_required: false
    optional_secret: AWS_ACCESS_KEY_ID
    max_workers: 10
    priority: high
    notes: "Always-free 1M req + 400K GB-sec/month. Needs free AWS account."

  supabase_edge:
    type: edge_function
    url: https://supabase.com
    free_invocations_month: 500000
    resets: monthly
    deploy_method: supabase_api
    enroll_script: scripts/enrollers/supabase_edge.py
    no_secret_required: false
    optional_secret: SUPABASE_ACCESS_TOKEN
    max_workers: 5
    priority: low
    notes: "500K edge invocations/month free. 2 free projects."
