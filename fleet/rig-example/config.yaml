# GitMine Rig Configuration
# Copy to fleet/<your-rig-id>/config.yaml and customize.
# The pool operator reads this for fleet monitoring.

rig:
  id: "rig-example"          # Must match the directory name
  name: "My Mining Rig"      # Human-readable label
  owner: "your-github-user"  # GitHub username

# Coin(s) this rig mines. One rig = one coin at a time.
# Switch by restarting the miner with --coin FNNC or --coin TTY.
mining:
  coin: "FNNC"               # FNNC (YescryptR16) or TTY (SHA256d)
  address: "FYourFennecPayoutAddressHere"
  threads: 1                 # CPU threads

# Ed25519 public key generated by the miner on first run.
# Run: python miner/git-mine.py --coin FNNC --address F... --rig <id>
# Then paste the printed pubkey here and commit this file.
identity:
  pubkey: ""                 # ed25519 hex pubkey — fill in after first run
