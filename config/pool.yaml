# GitMine — Dual-Coin Pool Configuration
# Coins: Fennec (FNNC) + Trinity (TTY)

pool:
  name: "GitMine"
  operator_github_owner: "5mil"
  operator_github_repo: "gitmine-tty"
  pages_base: "https://5mil.github.io/gitmine-tty"

coins:
  fnnc:
    ticker: "FNNC"
    name: "Fennec"
    address: "${FNNC_POOL_ADDRESS}"   # GitHub Secret: FNNC_POOL_ADDRESS
    fee_percent: 1.0
    network: "mainnet"
    rpc:
      host: "127.0.0.1"
      port: 8339
      user: "fnncpool"
      password: "${FNNC_RPC_PASS}"    # GitHub Secret: FNNC_RPC_PASS
    algo: "yescryptr16"

  tty:
    ticker: "TTY"
    name: "Trinity"
    address: "${TTY_POOL_ADDRESS}"    # GitHub Secret: TTY_POOL_ADDRESS
    fee_percent: 1.0
    network: "mainnet"
    rpc:
      host: "127.0.0.1"
      port: 12345
      user: "ttypool"
      password: "${TTY_RPC_PASS}"     # GitHub Secret: TTY_RPC_PASS
    algo: "sha256d"

operator:
  relay_host: "0.0.0.0"
  relay_port: 8765

template:
  ttl: 30              # seconds before template expires
  refresh_cron: "*/2 * * * *"

shares:
  branch_pending: "shares-pending"
  branch_accepted: "shares-accepted"
  branch_rejected: "shares-rejected"
  max_per_commit: 10
  batch_interval: 5    # seconds between pushes from miner
