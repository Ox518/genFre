# GitMine — Dual-Coin Pool Configuration
# Coins: Fennec (FNNC/YescryptR16) + Trinity (TTY/SHA256d)

pool:
  name: "GitMine"
  operator_github_owner: "5mil"
  operator_github_repo: "gitmine-tty"
  pages_base: "https://5mil.github.io/gitmine-tty"

coins:
  fnnc:
    ticker: "FNNC"
    name: "Fennec"
    address: "${FNNC_POOL_ADDRESS}"   # GitHub Secret — your Fennec payout address
    fee_percent: 1.0
    network: "mainnet"
    algo: "yescryptr16"
    rpc:
      host: "127.0.0.1"
      port: 8339
      user: "fnncpool"
      pass: "gitmine-fnnc-rpc-2026"   # Internal only — loopback, not exposed

  tty:
    ticker: "TTY"
    name: "Trinity"
    address: "${TTY_POOL_ADDRESS}"    # GitHub Secret — your Trinity payout address
    fee_percent: 1.0
    network: "mainnet"
    algo: "sha256d"
    rpc:
      host: "127.0.0.1"
      port: 12345
      user: "ttypool"
      pass: "gitmine-tty-rpc-2026"    # Internal only — loopback, not exposed

operator:
  relay_host: "0.0.0.0"
  relay_port: 8765

template:
  ttl: 30
  refresh_cron: "*/2 * * * *"

shares:
  branch_pending: "shares-pending"
  branch_accepted: "shares-accepted"
  branch_rejected: "shares-rejected"
  max_per_commit: 10
  batch_interval: 5
