# GitMine TTY — Pool Configuration
pool:
  name: "GitMine TTY"
  ticker: "TTY"
  address: "REPLACE_WITH_YOUR_TTY_ADDRESS"
  fee_percent: 1.0
  network: "mainnet"  # mainnet | testnet
  rpc:
    host: "127.0.0.1"
    port: 12345
    user: "ttypool"
    password: "REPLACE_WITH_RPC_PASSWORD"

operator:
  github_owner: "5mil"
  github_repo: "gitmine-tty"
  pages_base: "https://5mil.github.io/gitmine-tty"
  fennec_port: 8765  # Fennec WebSocket bridge port

template:
  ttl: 30              # seconds before template expires
  rotation: "round-robin"  # round-robin | profitability | manual
  refresh_cron: "*/2 * * * *"

shares:
  branch_pending: "shares-pending"
  branch_accepted: "shares-accepted"
  branch_rejected: "shares-rejected"
  max_per_commit: 10
  batch_interval: 5    # seconds between pushes from miner
