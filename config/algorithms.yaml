# Trinity TTY — Algorithm Configuration
# Three PoW algorithms: sha256d, scrypt, myr-groestl
# Pool rotates per block based on selection_mode below.

selection_mode: "round_robin"   # round_robin | profitability | fixed
fixed_algo: "scrypt"            # Only used when selection_mode = fixed

algorithms:
  sha256d:
    enabled: true
    difficulty: 500000
    target_block_time: 120        # seconds
    max_difficulty: 10000000
    min_difficulty: 10000
    share_validation: "sha256d"   # validation function key

  scrypt:
    enabled: true
    difficulty: 12000
    target_block_time: 120
    max_difficulty: 1000000
    min_difficulty: 1000
    scrypt_params:
      N: 1024
      r: 1
      p: 1
      dklen: 32
    share_validation: "scrypt"

  myr-groestl:
    enabled: true
    difficulty: 8000
    target_block_time: 120
    max_difficulty: 500000
    min_difficulty: 500
    share_validation: "myr_groestl"
