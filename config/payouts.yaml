# GitMine — Payout Configuration
payouts:
  # Minimum balance (in coin units) before a payout is generated
  threshold: 1.0

  # PPLNS window: number of recent shares used for reward calculation
  pplns_window: 200

  # Signing: how many operator signatures are required before broadcast
  signing:
    required: 1
    method: "webauthn"   # webauthn | gpg | manual

  # Schedule: payouts are triggered by the pool workflow
  # Set force_payout=true in workflow_dispatch to override threshold
  schedule: "on_threshold"
